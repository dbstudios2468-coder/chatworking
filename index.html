<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus v3 | Liquid Glass</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #74b9ff;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
            --bg: #0a0a0c;
            --blur: 40px;
        }

        [data-theme="void"] { --accent: #a29bfe; --bg: #050505; }
        [data-theme="dev"] { --accent: #55efc4; --bg: #0c100e; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* LIQUID BACKGROUND ENGINE */
        .mesh-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: var(--accent);
            border-radius: 50%;
            animation: drift 20s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(-10%, -10%) rotate(0deg) scale(1); }
            100% { transform: translate(30%, 20%) rotate(90deg) scale(1.2); }
        }

        /* MAIN GLASS HUB */
        .nexus-shell {
            width: 92vw;
            height: 85vh;
            max-width: 1100px;
            display: flex;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        /* NAVIGATION PILL */
        .sidebar-pill {
            width: 80px;
            background: var(--glass);
            backdrop-filter: blur(var(--blur)) saturate(150%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(150%);
            border: 1px solid var(--border);
            border-radius: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 25px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sidebar-pill:hover { width: 220px; align-items: flex-start; padding: 30px 20px; }

        .nav-item {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            text-decoration: none;
            background: rgba(255,255,255,0.05);
        }

        .sidebar-pill:hover .nav-item { width: 100%; border-radius: 20px; justify-content: flex-start; padding-left: 15px; }

        .nav-item i { font-size: 1.2rem; min-width: 20px; }
        .nav-label { display: none; margin-left: 12px; font-weight: 500; font-size: 0.9rem; white-space: nowrap; }
        .sidebar-pill:hover .nav-label { display: block; }

        .nav-item.active { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); }

        /* CONTENT STACK */
        .main-stage {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(var(--blur)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur)) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 45px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .stage-header {
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .messages-flow {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        /* LIQUID MESSAGE BUBBLES */
        .bubble {
            max-width: 75%;
            padding: 14px 20px;
            border-radius: 28px;
            color: white;
            font-size: 0.95rem;
            animation: bubbleSlide 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes bubbleSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bubble.me {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--accent), #fff);
            color: #000;
            border-bottom-right-radius: 6px;
        }

        .bubble.them {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        /* INPUT AREA */
        .input-bar {
            margin: 20px 30px 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .input-bar:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .input-bar input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:active { transform: scale(0.85); }

        /* AUTH SCREEN */
        #auth-gate {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(100px);
        }

        .gate-card {
            background: var(--glass);
            padding: 50px;
            border-radius: 50px;
            border: 1px solid var(--border);
            text-align: center;
            width: 400px;
        }

        input.auth-field {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 20px;
            color: white;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="mesh-container">
        <div class="blob"></div>
        <div class="blob" style="background: #ff79c6; right: 0; bottom: 0; animation-delay: -5s;"></div>
    </div>

    <div id="auth-gate">
        <div class="gate-card">
            <h1 style="color:white; margin-bottom:10px;">Nexus v3</h1>
            <p style="color:var(--accent); margin-bottom:30px; opacity:0.7;">Initialize Protocol</p>
            <input type="text" id="user-in" class="auth-field" placeholder="User Handle">
            <input type="password" id="key-in" class="auth-field" placeholder="AES Master Key">
            <button onclick="start()" style="width:100%; padding:20px; border-radius:20px; background:var(--accent); border:none; font-weight:700; cursor:pointer;">CONNECT</button>
        </div>
    </div>

    <div class="nexus-shell">
        <nav class="sidebar-pill">
            <div class="nav-item active" onclick="changeChamber('main', this)" title="Main">
                <i class="fas fa-home"></i><span class="nav-label">Main Nexus</span>
            </div>
            <div class="nav-item" onclick="changeChamber('void', this)" title="Void">
                <i class="fas fa-ghost"></i><span class="nav-label">The Void</span>
            </div>
            <div class="nav-item" onclick="changeChamber('dev', this)" title="Dev">
                <i class="fas fa-terminal"></i><span class="nav-label">Dev Stream</span>
            </div>
        </nav>

        <main class="main-stage">
            <header class="stage-header">
                <div>
                    <h2 id="room-title" style="color:white;">Main Nexus</h2>
                    <span id="status-dot" style="font-size:0.7rem; color:var(--accent);">● Encrypted</span>
                </div>
                <div style="opacity:0.5; color:white;"><i class="fas fa-shield-alt"></i> 256-bit</div>
            </header>

            <div class="messages-flow" id="flow">
                <div class="bubble them">System: Initializing liquid glass environment...</div>
            </div>

            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Pulse a message..." onkeypress="if(event.key==='Enter') push()">
                <button class="send-btn" onclick="push()"><i class="fas fa-arrow-up"></i></button>
            </div>
        </main>
    </div>

    <script>
        let client, currentChannel, user, secret;

        async function start() {
            user = document.getElementById('user-in').value;
            secret = document.getElementById('key-in').value;
            if(!user || !secret) return;

            // ABly Configuration for strict school filters
            client = new Ably.Realtime({
                key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA',
                transports: ['web_socket', 'xhr_streaming', 'xhr_polling'],
                fallbackHosts: ['ably-realtime.com', 'a.ably-realtime.com']
            });

            client.connection.on('connected', () => {
                document.getElementById('auth-gate').style.display = 'none';
                changeChamber('main', document.querySelector('.nav-item.active'));
            });
        }

        function changeChamber(roomId, el) {
            // UI Updates
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('room-title').innerText = roomId.charAt(0).toUpperCase() + roomId.slice(1) + " Chamber";
            document.body.setAttribute('data-theme', roomId);

            // Channel logic
            if(currentChannel) currentChannel.unsubscribe();
            
            currentChannel = client.channels.get(`nexus-v3-${roomId}`);
            
            currentChannel.subscribe('msg', (payload) => {
                if(payload.data.sender !== user) {
                    render(decrypt(payload.data.cipher), 'them', payload.data.sender);
                }
            });

            // Clear view for new chamber
            document.getElementById('flow').innerHTML = `<div class="bubble them">Entering ${roomId} chamber...</div>`;
        }

        function push() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;

            const cipher = encrypt(input.value);
            currentChannel.publish('msg', { sender: user, cipher: cipher });
            
            render(input.value, 'me', 'You');
            input.value = '';
        }

        function render(text, type, sender) {
            const f = document.getElementById('flow');
            const d = document.createElement('div');
            d.className = `bubble ${type}`;
            d.innerHTML = `<small style="display:block; opacity:0.6; font-size:0.65rem; margin-bottom:4px;">${sender}</small>${text}`;
            f.appendChild(d);
            f.scrollTop = f.scrollHeight;
        }

        function encrypt(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function decrypt(c) { 
            try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } 
            catch { return "[Decryption Failed]"; } 
        }
    </script>
</body>
</html>
