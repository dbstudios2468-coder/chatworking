<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Glass Nexus | Multi-Device Command Hub</title>
    <!-- Ably SDK for realtime -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <!-- CryptoJS for message encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Google Fonts + Icons for smoothness -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* improves glass feel on UI */
        }

        :root {
            --bg-start: #dce3ec;
            --bg-end: #eef2f8;
            --glass-base: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255,255,255,0.6);
            --text-primary: #1a2634;
            --text-secondary: #3a4a5c;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.02);
            --shadow-xl: 0 25px 45px -12px rgba(0,0,0,0.2);
            --blur-amount: 24px;
        }

        [data-theme="dark"] {
            --bg-start: #0f1219;
            --bg-end: #151e2c;
            --glass-base: rgba(20, 25, 40, 0.55);
            --glass-border: rgba(255,255,255,0.1);
            --text-primary: #f0f3fa;
            --text-secondary: #b9c3d4;
            --accent: #a29bfe;
            --accent-glow: rgba(162, 155, 254, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            padding: 20px;
        }

        /* LIQUID GLASS ANIMATIONS - ORB, RIPPLE, GLOW */
        .liquid-orb {
            position: fixed;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, var(--accent-glow), transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: liquidDrift 18s infinite alternate ease-in-out;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes liquidDrift {
            0% { transform: translate(-30%, -20%) scale(1); opacity: 0.2; }
            100% { transform: translate(20%, 30%) scale(1.3); opacity: 0.4; }
        }

        .ripple-wave {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 80%);
            animation: rippleExpand 1.2s forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes rippleExpand {
            0% { width: 0px; height: 0px; opacity: 0.6; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }

        /* MAIN CONTAINER – LIQUID GLASS CORE */
        .glass-hub {
            width: 100%;
            max-width: 1300px;
            height: 90vh;
            background: var(--glass-base);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border-radius: 56px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-xl), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            position: relative;
            z-index: 2;
        }

        /* MODULAR ROOMS SIDEBAR (EXPANDABLE) */
        .rooms-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .rooms-header {
            padding: 24px 20px 12px;
            font-weight: 600;
            letter-spacing: -0.3px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .room-list {
            flex: 1;
            padding: 16px 12px;
        }

        .room-item {
            background: rgba(255,255,255,0.1);
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.25s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid transparent;
        }

        .room-item i {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .room-item.active-room {
            background: var(--accent);
            color: white;
            box-shadow: 0 6px 14px var(--accent-glow);
            border-color: rgba(255,255,255,0.4);
        }

        .room-item:hover:not(.active-room) {
            background: rgba(255,255,255,0.25);
            transform: scale(0.98);
        }

        .add-room-btn {
            margin: 16px;
            background: rgba(255,255,255,0.2);
            border: 1px dashed rgba(255,255,255,0.5);
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        /* MAIN CHAT AREA */
        .main-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px 28px;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 28px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 0.9rem;
            animation: floatGlassy 0.3s ease-out;
            transition: 0.2s;
            word-break: break-word;
            position: relative;
        }

        @keyframes floatGlassy {
            from { opacity: 0; transform: translateY(12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .my-message {
            align-self: flex-end;
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 8px;
        }

        .other-message {
            align-self: flex-start;
            background: rgba(255,255,255,0.35);
            border-bottom-left-radius: 8px;
        }

        .admin-badge {
            font-size: 0.65rem;
            font-weight: bold;
            background: #ff4757;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }

        .input-area {
            padding: 18px 24px;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(12px);
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .input-area input {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            backdrop-filter: blur(4px);
        }

        button {
            background: var(--accent);
            border: none;
            border-radius: 60px;
            padding: 0 24px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
        }

        button:active { transform: scale(0.96); }

        /* device layout switcher */
        .device-switch {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 60px;
        }

        .device-icon {
            cursor: pointer;
            font-size: 1.3rem;
            padding: 5px;
            transition: 0.2s;
            opacity: 0.6;
        }

        .device-icon.active-device {
            opacity: 1;
            color: var(--accent);
            text-shadow: 0 0 6px var(--accent-glow);
        }

        /* WATCH MODE */
        body.watch-mode .glass-hub {
            max-width: 380px;
            height: 85vh;
            border-radius: 64px;
        }
        body.watch-mode .rooms-panel { width: 220px; }
        body.watch-mode .message-bubble { max-width: 90%; font-size: 0.75rem; }

        /* PHONE MODE */
        body.phone-mode .glass-hub {
            max-width: 460px;
            height: 90vh;
            border-radius: 44px;
        }
        body.phone-mode .rooms-panel { width: 240px; }

        /* HIDE SCROLLBARS but functional */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="liquid-orb" style="top: -20%; left: -10%;"></div>
    <div class="liquid-orb" style="bottom: -20%; right: -5%; animation-duration: 22s;"></div>

    <div class="glass-hub" id="glassHub">
        <!-- MODULAR ROOMS PANEL (expandable) -->
        <div class="rooms-panel" id="roomsPanel">
            <div class="rooms-header">
                <i class="fas fa-cubes"></i> LIQUID CHAMBERS
            </div>
            <div class="room-list" id="roomListContainer">
                <!-- dynamic rooms -->
            </div>
            <div class="add-room-btn" id="addRoomBtn">
                <i class="fas fa-plus-circle"></i> Create new room
            </div>
        </div>

        <!-- MAIN INTERFACE -->
        <div class="main-chat-area">
            <div class="chat-header">
                <div><i class="fas fa-comment-dots"></i> <span id="currentRoomName">Loading...</span></div>
                <div class="device-switch" id="deviceSwitcher">
                    <div class="device-icon" data-mode="desktop"><i class="fas fa-desktop"></i></div>
                    <div class="device-icon" data-mode="phone"><i class="fas fa-mobile-alt"></i></div>
                    <div class="device-icon" data-mode="watch"><i class="fas fa-clock"></i></div>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div style="text-align:center; opacity:0.6; padding:20px;">✨ Enter credentials to connect</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Liquid message..." autocomplete="off">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

    <!-- Login Modal (glassier) -->
    <div id="loginOverlay" style="position:fixed; inset:0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); display:flex; align-items:center; justify-content:center; z-index:1000;">
        <div style="background: rgba(30,30,50,0.5); backdrop-filter: blur(32px); border-radius: 48px; padding: 32px; width: 320px; border: 1px solid rgba(255,255,255,0.3); text-align:center;">
            <h2 style="color:white;">🔐 Nexus Entry</h2>
            <input type="password" id="loginPass" placeholder="Master Key" style="width:100%; margin:16px 0; padding:12px; border-radius:40px; background:rgba(255,255,255,0.2); border:none; color:white;">
            <input type="password" id="adminPasscode" placeholder="Admin override (optional)" style="width:100%; margin-bottom:16px; padding:12px; border-radius:40px; background:rgba(255,255,255,0.2); border:none; color:white;">
            <button id="doLoginBtn" style="width:100%; background: var(--accent);">Unlock</button>
            <div id="loginError" style="color:#ff8a7a; margin-top:12px;"></div>
        </div>
    </div>

    <div id="usernameModal" style="position:fixed; inset:0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); display:none; align-items:center; justify-content:center; z-index:1000;">
        <div style="background: rgba(30,30,50,0.5); backdrop-filter: blur(32px); border-radius: 48px; padding: 32px; width: 320px; border: 1px solid rgba(255,255,255,0.3);">
            <h3 style="color:white;">Your callsign</h3>
            <input type="text" id="usernameField" placeholder="Agent name" style="width:100%; margin:16px 0; padding:12px; border-radius:40px; background:rgba(255,255,255,0.2); color:white;">
            <button id="confirmUserBtn" style="width:100%;">Enter The Network</button>
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const ABLY_API_KEY = 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA';  // replace before deploy! but works on school wifi if real key.
        let ablyClient = null;
        let currentChannel = null;
        let currentRoomId = "lobby";
        let rooms = new Map();   // roomId -> { name, channelInstance }
        let username = "";
        let secretKey = "";
        let isAdmin = false;
        let masterPassword = "crystal";
        let adminRootCode = "glassmaster";
        let mutedSet = new Set();  // store muted users per session

        // Helper: Ripple effect on glass
        function createRipple(x, y, container) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-wave';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1200);
        }

        // Render messages for current room
        function renderMessages(roomId) {
            const container = document.getElementById('messagesContainer');
            if(!container) return;
            const roomData = rooms.get(roomId);
            if(!roomData) return;
            container.innerHTML = '';
            (roomData.messages || []).forEach(msg => {
                const isMe = msg.sender === username;
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isMe ? 'my-message' : 'other-message'}`;
                let adminFlag = msg.isAdmin ? `<span class="admin-badge"><i class="fas fa-crown"></i> ADMIN</span>` : '';
                let muteIcon = (isAdmin && !isMe) ? `<i class="fas fa-microphone-slash" style="margin-left:8px; cursor:pointer; opacity:0.7;" onclick="adminMuteUser('${msg.sender}')"></i>` : '';
                let delIcon = (isAdmin) ? `<i class="fas fa-trash-alt" style="margin-left:8px; cursor:pointer;" onclick="adminDeleteMsg('${roomId}','${msg.id}')"></i>` : '';
                bubble.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${msg.sender} ${adminFlag}</strong>
                        <span style="font-size:10px;">${muteIcon} ${delIcon}</span>
                    </div>
                    <div class="msg-text" data-enc="${msg.encrypted}" data-dec="${msg.decryptedText}">${msg.decryptedText}</div>
                `;
                // toggle encryption reveal
                const textDiv = bubble.querySelector('.msg-text');
                textDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(textDiv.innerText === textDiv.getAttribute('data-enc')) {
                        textDiv.innerText = textDiv.getAttribute('data-dec');
                    } else {
                        textDiv.innerText = textDiv.getAttribute('data-enc');
                    }
                    createRipple(e.clientX, e.clientY, document.querySelector('.glass-hub'));
                });
                container.appendChild(bubble);
            });
            container.scrollTop = container.scrollHeight;
        }

        // Publish encrypted message
        async function sendMessage(roomId, plainText) {
            if(!plainText.trim() || !currentChannel) return;
            const encrypted = CryptoJS.AES.encrypt(plainText, secretKey).toString();
            const payload = {
                text: encrypted,
                sender: username,
                isAdmin: isAdmin,
                timestamp: Date.now(),
                room: roomId
            };
            await currentChannel.publish('liquid_msg', payload);
            // also store locally
            const room = rooms.get(roomId);
            if(room) {
                const newMsg = {
                    id: Date.now() + '-' + Math.random(),
                    sender: username,
                    encrypted: encrypted,
                    decryptedText: plainText,
                    isAdmin: isAdmin
                };
                room.messages.push(newMsg);
                renderMessages(roomId);
            }
        }

        // Announcement (admin broadcast)
        async function sendAnnouncement(roomId, text) {
            if(!isAdmin) return;
            const encrypted = CryptoJS.AES.encrypt(`🔊 ANNOUNCEMENT: ${text}`, secretKey).toString();
            await currentChannel.publish('liquid_msg', {
                text: encrypted,
                sender: "SYSTEM",
                isAdmin: true,
                isAnnounce: true,
                room: roomId
            });
        }

        // Room creation (modular expandable)
        function addRoom(roomId, roomName) {
            if(rooms.has(roomId)) return;
            rooms.set(roomId, { name: roomName, messages: [], channelObj: null, ablyChannelName: `liquid_${roomId}` });
            refreshRoomListUI();
            if(roomId === currentRoomId) switchRoom(roomId);
        }

        function refreshRoomListUI() {
            const container = document.getElementById('roomListContainer');
            container.innerHTML = '';
            for(let [id, data] of rooms.entries()) {
                const roomDiv = document.createElement('div');
                roomDiv.className = `room-item ${currentRoomId === id ? 'active-room' : ''}`;
                roomDiv.innerHTML = `<i class="fas fa-door-open"></i> ${data.name}`;
                roomDiv.onclick = () => switchRoom(id);
                container.appendChild(roomDiv);
            }
        }

        async function switchRoom(roomId) {
            if(!ablyClient) return;
            if(currentChannel) await currentChannel.unsubscribe();
            const roomData = rooms.get(roomId);
            if(!roomData) return;
            currentRoomId = roomId;
            document.getElementById('currentRoomName').innerText = roomData.name;
            // attach realtime channel
            const channelName = roomData.ablyChannelName;
            currentChannel = ablyClient.channels.get(channelName);
            await currentChannel.subscribe('liquid_msg', (message) => {
                const msg = message.data;
                if(mutedSet.has(msg.sender)) return;
                let decryptedText = "";
                try {
                    decryptedText = CryptoJS.AES.decrypt(msg.text, secretKey).toString(CryptoJS.enc.Utf8);
                    if(!decryptedText) decryptedText = "[encrypted payload]";
                } catch(e) { decryptedText = "[encryption mismatch]"; }
                const finalMsg = {
                    id: message.id,
                    sender: msg.sender,
                    encrypted: msg.text,
                    decryptedText: decryptedText,
                    isAdmin: msg.isAdmin,
                };
                const targetRoom = rooms.get(msg.room);
                if(targetRoom && msg.room === roomId) {
                    targetRoom.messages.push(finalMsg);
                    renderMessages(roomId);
                } else if(targetRoom && msg.room !== roomId) {
                    targetRoom.messages.push(finalMsg);
                } else if(!targetRoom && rooms.has(msg.room)){
                    rooms.get(msg.room).messages.push(finalMsg);
                }
                // ripple effect on new message
                createRipple(Math.random() * 200, Math.random() * 100, document.querySelector('.glass-hub'));
            });
            renderMessages(roomId);
            refreshRoomListUI();
        }

        // Admin actions: mute & delete message across rooms (sync via command channel)
        async function adminMuteUser(targetUser) {
            if(!isAdmin) return;
            mutedSet.add(targetUser);
            const commandChannel = ablyClient.channels.get('admin_commands');
            await commandChannel.publish('cmd', { type: 'mute', target: targetUser, admin: username });
            alert(`${targetUser} muted globally`);
        }

        async function adminDeleteMsg(roomId, msgId) {
            if(!isAdmin) return;
            const room = rooms.get(roomId);
            if(room) {
                room.messages = room.messages.filter(m => m.id != msgId);
                renderMessages(roomId);
                // broadcast deletion
                const commandChannel = ablyClient.channels.get('admin_commands');
                await commandChannel.publish('cmd', { type: 'del_msg', roomId, msgId });
            }
        }

        // initialize default rooms (expandable)
        function initDefaultRooms() {
            rooms.clear();
            addRoom("lobby", "🌊 Main Lobby");
            addRoom("ops", "⚙️ Operations");
            addRoom("command", "🎖️ Command Bridge");
            addRoom("whisper", "🌀 Whisper Lounge");
        }

        // Login flow
        document.getElementById('doLoginBtn').onclick = () => {
            const pass = document.getElementById('loginPass').value;
            const adminCandidate = document.getElementById('adminPasscode').value;
            if(pass === masterPassword) {
                secretKey = pass;
                isAdmin = (adminCandidate === adminRootCode);
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('usernameModal').style.display = 'flex';
            } else {
                document.getElementById('loginError').innerText = 'Invalid master key';
            }
        };

        document.getElementById('confirmUserBtn').onclick = async () => {
            const user = document.getElementById('usernameField').value.trim();
            if(!user) return;
            username = user;
            document.getElementById('usernameModal').style.display = 'none';
            // init ably
            if(ABLY_API_KEY === 'YOUR_ABLY_ROOT_KEY_HERE') {
                alert("⚠️ Replace ABLY_API_KEY with real key for full functionality. For demo, simulated mode will work on UI but no real sync. But structure works 100% with real key.");
            }
            try {
                ablyClient = new Ably.Realtime({ key: ABLY_API_KEY, clientId: username });
                await ablyClient.connection.once('connected');
                initDefaultRooms();
                // attach admin command channel
                const cmdChannel = ablyClient.channels.get('admin_commands');
                await cmdChannel.subscribe('cmd', (msg) => {
                    if(msg.data.type === 'mute' && isAdmin) mutedSet.add(msg.data.target);
                    if(msg.data.type === 'del_msg' && isAdmin) {
                        const targetRoom = rooms.get(msg.data.roomId);
                        if(targetRoom) {
                            targetRoom.messages = targetRoom.messages.filter(m => m.id != msg.data.msgId);
                            if(currentRoomId === msg.data.roomId) renderMessages(currentRoomId);
                        }
                    }
                });
                await switchRoom("lobby");
                // extra glassy: presence not mandatory but stable
            } catch(e) {
                alert("Ably connection issue, but offline UI works for demo. Replace API key for live.");
                // fallback offline mode simulation
                initDefaultRooms();
                switchRoom("lobby");
            }
        };

        // SEND BUTTON
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('messageInput');
            if(input.value.trim()) sendMessage(currentRoomId, input.value);
            input.value = '';
        };
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); });

        // Add room logic (expandable)
        document.getElementById('addRoomBtn').onclick = () => {
            let newName = prompt("Enter new room name:", "Crystal Nexus");
            if(newName) {
                const newId = "room_" + Date.now();
                addRoom(newId, newName.substring(0, 20));
                switchRoom(newId);
            }
        };

        // Device UI switcher (Windows PC, Phone, Watch) with layout transformations
        function setDeviceMode(mode) {
            document.body.classList.remove('watch-mode', 'phone-mode');
            if(mode === 'phone') document.body.classList.add('phone-mode');
            if(mode === 'watch') document.body.classList.add('watch-mode');
            // optional resize adjustment
            const hub = document.getElementById('glassHub');
            hub.style.transition = "all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2)";
            localStorage.setItem('devicePref', mode);
        }
        document.querySelectorAll('.device-icon').forEach(el => {
            el.addEventListener('click', (e) => {
                const mode = el.getAttribute('data-mode');
                setDeviceMode(mode);
                document.querySelectorAll('.device-icon').forEach(ic => ic.classList.remove('active-device'));
                el.classList.add('active-device');
            });
        });
        // Load device preference
        const savedDevice = localStorage.getItem('devicePref');
        if(savedDevice) setDeviceMode(savedDevice);
        else setDeviceMode('desktop');
        document.querySelector(`.device-icon[data-mode="${savedDevice || 'desktop'}"]`).classList.add('active-device');

        // extra liquid glass animations: dynamic accent hue & glass morph
        let hueRotate = 0;
        setInterval(() => {
            hueRotate = (hueRotate + 0.3) % 360;
            document.documentElement.style.setProperty('--accent', `hsl(${hueRotate}, 70%, 65%)`);
            document.documentElement.style.setProperty('--accent-glow', `hsla(${hueRotate}, 80%, 65%, 0.4)`);
        }, 80);
        
        // Add glass morph ripples on any button click
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => createRipple(e.clientX, e.clientY, document.querySelector('.glass-hub')));
        });
        window.adminMuteUser = adminMuteUser;
        window.adminDeleteMsg = adminDeleteMsg;
    </script>
</body>
</html>
