<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus v9.1 | Secure Fluid</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --bg: #010204;
            --blur: 40px;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s var(--spring); }
        body { background: var(--bg); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .liquid-cosmos { position: fixed; inset: 0; z-index: -1; filter: blur(100px) contrast(1.2); }
        .plasma-orb { position: absolute; width: 60vh; height: 60vh; background: var(--accent); border-radius: 50%; opacity: 0.3; animation: plasma-drift 25s infinite alternate linear; }
        @keyframes plasma-drift { 0% { transform: translate(-15%, -15%); } 100% { transform: translate(35%, 35%); } }

        /* DOCK */
        .control-dock {
            position: fixed; bottom: 5vh; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); backdrop-filter: blur(25px);
            padding: 8px 16px; border-radius: 100px; display: flex; gap: 10px;
            z-index: 9999; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .dock-tool { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; background: rgba(255,255,255,0.05); font-size: 0.9rem; }
        .dock-tool.active { background: var(--accent); color: black; box-shadow: 0 0 20px var(--accent); opacity: 1; }

        /* LAYOUTS */
        .nexus-wrapper { display: grid; gap: 15px; position: relative; margin: auto; max-width: 100%; }
        .mode-computer { width: 95vw; height: 80vh; grid-template-columns: 240px 1fr 200px; }
        .mode-mobile { width: 380px; height: 82vh; grid-template-columns: 1fr; border-radius: 40px; }
        .mode-watch { width: 360px; height: 360px; border-radius: 50% !important; border: 8px solid var(--border); grid-template-columns: 1fr; }
        .mode-watch aside { display: none; }

        /* PANELS */
        .glass-panel { background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(200%); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; position: relative; border-radius: 30px; }
        .scroll-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; padding-bottom: 30px; }

        .bubble { padding: 12px 18px; border-radius: 22px; font-size: 0.9rem; animation: liquid-pop 0.5s var(--spring); }
        @keyframes liquid-pop { 0% { transform: scale(0.8) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .bubble.me { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #fff); color: #000; font-weight: 700; }
        .bubble.them { align-self: flex-start; background: rgba(255,255,255,0.12); color: #fff; border: 1px solid var(--border); }

        /* OVERLAYS */
        .overlay { 
            position: absolute; inset: 15px; background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(40px); z-index: 5000; padding: 25px; 
            display: none; flex-direction: column; border-radius: 25px; 
            color: white; overflow-y: auto; max-height: calc(100% - 30px);
        }
        .mode-watch .overlay { inset: 0; border-radius: 50%; padding: 60px 40px; }

        /* AUTH (The Gate) */
        #gate { position: fixed; inset: 0; z-index: 9000; background: #000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 35px; border: 1px solid var(--border); text-align: center; max-width: 400px; width: 100%; transition: 0.3s; }
        .input-liquid { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; margin-bottom: 12px; text-align: center; outline: none; }
        .btn-fluid { width: 100%; padding: 16px; border-radius: 14px; border: none; background: white; color: black; font-weight: 800; cursor: pointer; }
        .btn-fluid:disabled { opacity: 0.5; cursor: not-allowed; }

        /* SHAKE ANIMATION FOR ERRORS */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="liquid-cosmos"><div class="plasma-orb" id="orb"></div></div>

    <div class="control-dock">
        <div class="dock-tool active" onclick="setMode('computer', this)"><i class="fas fa-desktop"></i></div>
        <div class="dock-tool" onclick="setMode('mobile', this)"><i class="fas fa-mobile-alt"></i></div>
        <div class="dock-tool" onclick="setMode('watch', this)"><i class="fas fa-clock"></i></div>
        <div style="width:1px; background:var(--border); margin:5px 0;"></div>
        <div class="dock-tool" onclick="toggleOverlay('settings')"><i class="fas fa-palette"></i></div>
        <div class="dock-tool" onclick="toggleFS()"><i class="fas fa-expand"></i></div>
    </div>

    <div id="gate">
        <div class="login-card" id="auth-card">
            <h1 style="color:white; margin-bottom: 20px; letter-spacing: -1px;">NEXUS <span style="color:var(--accent)">V9.1</span></h1>
            <input type="text" id="username-in" placeholder="Username" class="input-liquid" autocomplete="off">
            <input type="password" id="passcode-in" placeholder="Passcode" class="input-liquid">
            <button onclick="boot()" id="boot-btn" class="btn-fluid">ENGAGE</button>
            <p id="boot-status" style="margin-top: 15px; font-size: 0.8rem; color: var(--accent); opacity: 0.8;"></p>
        </div>
    </div>

    <div class="nexus-wrapper mode-computer" id="ui">
        <aside class="glass-panel" style="border-radius: inherit;">
            <div style="padding:20px; font-weight:800; color:white; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
                ROOMS <i class="fas fa-plus-circle" onclick="toggleOverlay('room-maker')" style="cursor:pointer; color:var(--accent);"></i>
            </div>
            <div id="rooms-list" style="padding:10px;"></div>
        </aside>

        <main class="glass-panel" style="border-radius: inherit;">
            <div id="settings" class="overlay">
                <h3>Specular Settings</h3>
                <div style="margin-top:20px;">
                    <label>Glass Frost</label>
                    <input type="range" min="0" max="100" oninput="document.documentElement.style.setProperty('--blur', this.value+'px')">
                    <label>Liquid Saturation</label>
                    <input type="range" min="10" max="100" oninput="document.getElementById('orb').style.opacity = this.value/100">
                </div>
                <button onclick="toggleOverlay('settings')" class="btn-fluid" style="margin-top:auto;">SAVE CHANGES</button>
            </div>

            <div id="room-maker" class="overlay">
                <h3>Deploy Chamber</h3>
                <input type="text" id="room-name-in" placeholder="Chamber Name..." class="input-liquid" style="margin:20px 0;">
                <button onclick="addRoom()" class="btn-fluid">CREATE</button>
                <button onclick="toggleOverlay('room-maker')" style="background:transparent; color:white; border:none; margin-top:15px; cursor:pointer;">Cancel</button>
            </div>

            <div class="scroll-flow" id="view"></div>
            
            <div style="padding: 15px; background: rgba(0,0,0,0.3);">
                <div style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 100px; padding: 5px; display: flex;">
                    <input type="text" id="msg-input" placeholder="Transmit..." style="flex:1; background:transparent; border:none; padding:10px 15px; color:white; outline:none;" onkeypress="if(event.key==='Enter') push()">
                    <button onclick="push()" style="background:#fff; border:none; padding:0 15px; border-radius:100px; font-weight:800; cursor:pointer;">SEND</button>
                </div>
            </div>
        </main>

        <aside class="glass-panel" style="border-radius: inherit;">
            <div style="padding:20px; font-weight:800; color:white; border-bottom:1px solid var(--border);">VITALITY</div>
            <div style="padding:15px; color:var(--accent); font-size:0.8rem; display:flex; align-items:center; gap:8px;">
                <div style="width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow: 0 0 10px var(--accent);"></div>
                <span>Online</span>
            </div>
        </aside>
    </div>

    <script>
        let client, chan, user, secret, cur = 'main';
        let customRooms = JSON.parse(localStorage.getItem('nx_v91_rooms')) || ['main', 'void'];

        async function boot() {
            const uField = document.getElementById('username-in');
            const pField = document.getElementById('passcode-in');
            const btn = document.getElementById('boot-btn');
            const card = document.getElementById('auth-card');
            const status = document.getElementById('boot-status');

            user = uField.value.trim();
            secret = pField.value.trim();

            if(!user || !secret) {
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                return;
            }

            btn.disabled = true;
            status.innerText = "Synchronizing Fluid...";

            try {
                // Initializing Ably with fallback and error handling
                client = new Ably.Realtime({ 
                    key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA',
                    transports: ['web_socket', 'xhr_streaming', 'xhr_polling']
                });

                client.connection.on('connected', () => {
                    document.getElementById('gate').style.display = 'none';
                    renderRooms();
                    switchRoom('main');
                });

                client.connection.on('failed', () => {
                    status.innerText = "Signal Blocked by Network";
                    btn.disabled = false;
                });

                // Timeout if connection takes too long
                setTimeout(() => {
                    if (client.connection.state !== 'connected') {
                        status.innerText = "Connection Weak... Retrying";
                        btn.disabled = false;
                    }
                }, 5000);

            } catch (e) {
                status.innerText = "Initialization Error";
                btn.disabled = false;
            }
        }

        function setMode(m, btn) {
            document.getElementById('ui').className = 'nexus-wrapper mode-' + m;
            document.querySelectorAll('.dock-tool').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function addRoom() {
            const n = document.getElementById('room-name-in').value.trim().toLowerCase();
            if(n && !customRooms.includes(n)) {
                customRooms.push(n);
                localStorage.setItem('nx_v91_rooms', JSON.stringify(customRooms));
                renderRooms();
                toggleOverlay('room-maker');
            }
        }

        function renderRooms() {
            document.getElementById('rooms-list').innerHTML = customRooms.map(r => `
                <div onclick="switchRoom('${r}')" style="padding:12px 15px; border-radius:12px; color:${r===cur?'#000':'#fff'}; background:${r===cur?'var(--accent)':'transparent'}; cursor:pointer; margin-bottom:5px; font-weight:700; font-size:0.85rem;">
                    ${r.toUpperCase()}
                </div>
            `).join('');
        }

        function switchRoom(id) {
            cur = id;
            let seed = id.split('').reduce((a,b)=>a+b.charCodeAt(0),0);
            const hue = seed % 360;
            document.documentElement.style.setProperty('--accent', `hsl(${hue}, 100%, 60%)`);
            document.documentElement.style.setProperty('--accent-glow', `hsla(${hue}, 100%, 60%, 0.4)`);
            renderRooms();

            if(chan) chan.unsubscribe();
            chan = client.channels.get(`v91-${id}`);
            chan.subscribe('msg', p => {
                if(p.data.u !== user) renderMsg(dec(p.data.c), 'them', p.data.u);
            });
            document.getElementById('view').innerHTML = '';
            loadHistory();
        }

        function push() {
            const i = document.getElementById('msg-input');
            if(!i.value) return;
            const data = { u: user, c: enc(i.value), t: Date.now() };
            chan.publish('msg', data);
            saveMsg(data);
            renderMsg(i.value, 'me', 'You');
            i.value = '';
        }

        function renderMsg(txt, type, s) {
            const v = document.getElementById('view');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerHTML = `<small style="display:block;opacity:0.5;font-size:0.6rem;margin-bottom:4px;">${s}</small>${txt}`;
            v.appendChild(b);
            v.scrollTop = v.scrollHeight;
        }

        function saveMsg(data) {
            let h = JSON.parse(localStorage.getItem(`nx91_${cur}`)) || [];
            h.push(data);
            localStorage.setItem(`nx91_${cur}`, JSON.stringify(h.slice(-50)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem(`nx91_${cur}`)) || [];
            h.forEach(d => renderMsg(dec(d.c), d.u === user ? 'me' : 'them', d.u === user ? 'You' : d.u));
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function enc(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function dec(c) { try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } catch { return "[Encrypted]"; } }
    </script>
</body>
</html>
