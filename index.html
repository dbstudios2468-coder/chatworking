<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Nexus | AES-256</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #e0e5ec;
            --glass: rgba(255, 255, 255, 0.2);
            --text: #2d3436;
            --accent: #6c5ce7;
            --shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff;
        }

        [data-theme="dark"] {
            --bg: #0a0c10;
            --glass: rgba(255, 255, 255, 0.02);
            --text: #f1f2f6;
            --shadow: 10px 10px 30px #000000, -10px -10px 30px #1a1e24;
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; transition: background 0.5s ease; overflow: hidden;
        }

        .blobs { position: absolute; width: 100%; height: 100%; z-index: -1; overflow: hidden; filter: blur(60px); }
        .blob { position: absolute; background: var(--accent); border-radius: 50%; opacity: 0.25; animation: move 20s infinite alternate linear; }
        @keyframes move { 0% { transform: translate(-10%, -10%); } 100% { transform: translate(20%, 20%); } }

        .container {
            width: 95%; max-width: 480px; height: 85vh;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px; box-shadow: var(--shadow);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        #sidebar {
            position: absolute; left: -300px; top: 0; width: 280px; height: 100%;
            background: var(--bg); border-right: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.65, 0, 0.35, 1); z-index: 1000; padding: 30px; box-sizing: border-box;
        }
        #sidebar.open { left: 0; }
        
        .screen { display: none; padding: 30px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        #chat-box { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .msg { 
            margin-bottom: 15px; padding: 15px 20px; border-radius: 25px; 
            background: rgba(255, 255, 255, 0.1); width: fit-content; max-grow: 1; max-width: 85%;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .msg:hover { background: rgba(255, 255, 255, 0.2); }
        .msg b { display: block; font-size: 0.65rem; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1.5px; }
        .msg-c { font-family: monospace; word-break: break-all; font-size: 0.9rem; }

        .input-area { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; color: var(--text); flex-grow: 1; outline: none; }
        button { padding: 15px 25px; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 700; }

        .top-icons { position: absolute; top: 25px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; z-index: 10; box-sizing: border-box; }
        .panic-btn { position: absolute; bottom: 20px; left: 20px; opacity: 0.2; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="blobs"><div class="blob" style="width: 500px; height: 500px; top: -100px; left: -100px;"></div></div>

<div class="container">
    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h3>Operatives</h3>
            <span style="cursor:pointer" onclick="toggleSidebar()">✕</span>
        </div>
        <div id="member-list"></div>
    </div>

    <div class="top-icons">
        <div style="cursor:pointer" onclick="toggleSidebar()">☰</div>
        <div style="cursor:pointer" onclick="toggleTheme()">🌓</div>
    </div>

    <div class="panic-btn" onclick="location.href='https://google.com'">🚨</div>

    <div id="pw-screen" class="screen" style="justify-content:center;">
        <h2 style="text-align:center; font-weight:200;">SECURE ACCESS</h2>
        <input type="password" id="pw-input" placeholder="Encryption Key">
        <button onclick="checkPw()">INITIALIZE</button>
    </div>

    <div id="user-screen" class="screen" style="justify-content:center;">
        <h2 style="text-align:center; font-weight:200;">CODENAME</h2>
        <input type="text" id="username-input" placeholder="Operative ID">
        <button onclick="startChat()">LINK</button>
    </div>

    <div id="chat-screen" class="screen">
        <div style="height:60px;"></div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type secure message...">
            <button onclick="sendText()">➤</button>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA';
    let username = "", ably, channel, secretKey = "";

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function checkPw() {
        const val = document.getElementById('pw-input').value;
        if(val.toLowerCase() === 'morse') {
            secretKey = val; // This is now used for the AES decryption
            showScreen('user-screen');
        } else {
            alert("Wrong Key");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startChat() {
        username = document.getElementById('username-input').value.trim();
        if(!username || ABLY_KEY.includes('YOUR')) return;
        
        if ("Notification" in window) await Notification.requestPermission();
        
        showScreen('chat-screen');
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: username });
        channel = ably.channels.get('secure-nexus');

        channel.history((err, page) => {
            if(!err) page.items.reverse().forEach(m => addBubble(m.clientId, m.data.text, m.clientId === username));
        });

        channel.subscribe('msg', (m) => {
            if (m.clientId !== username && document.hidden) {
                new Notification(`Secure Signal Received`, { body: "Encrypted data in Nexus." });
            }
            addBubble(m.clientId, m.data.text, m.clientId === username);
        });

        channel.presence.enter();
        channel.presence.subscribe(() => {
            channel.presence.get((err, members) => {
                document.getElementById('member-list').innerHTML = members.map(m => `<div style="padding:10px; border-radius:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; font-size:0.8rem;">● ${m.clientId}</div>`).join('');
            });
        });
    }

    function addBubble(id, encryptedData, isMe) {
        const box = document.getElementById('chat-box');
        
        // --- SECURE DECRYPTION ---
        let decryptedText;
        try {
            const bytes = CryptoJS.AES.decrypt(encryptedData, secretKey);
            decryptedText = bytes.toString(CryptoJS.enc.Utf8);
            if (!decryptedText) throw new Error(); 
        } catch (e) {
            decryptedText = "[BLOCKING ERROR: Invalid Key]";
        }

        const div = document.createElement('div');
        div.className = 'msg';
        if(isMe) div.style.cssText = 'margin-left:auto; background:var(--accent); color:white;';
        
        // Initial state is the "locked" encrypted string
        div.onclick = function() {
            const span = this.querySelector('.msg-c');
            span.innerText = span.innerText === encryptedData ? decryptedText : encryptedData;
        };

        div.innerHTML = `<b>${isMe ? 'You' : id}</b><span class="msg-c">${encryptedData}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function sendText() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;

        // --- SECURE ENCRYPTION ---
        const encrypted = CryptoJS.AES.encrypt(input.value, secretKey).toString();
        
        channel.publish('msg', { text: encrypted });
        input.value = "";
    }

    document.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            const active = document.querySelector('.screen.active')?.id;
            if(active === 'chat-screen') sendText();
            else if(active === 'pw-screen') checkPw();
            else if(active === 'user-screen') startChat();
        }
    });

    showScreen('pw-screen');
</script>
</body>
</html>
