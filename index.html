<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Prime | Stealth Fixed</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #e0e5ec; --glass: rgba(255, 255, 255, 0.25);
            --text: #2d3436; --accent: #6c5ce7;
            --shadow: 20px 20px 60px #bec3c9, -20px -20px 60px #ffffff;
        }
        [data-theme="dark"] {
            --bg: #0a0c10; --glass: rgba(255, 255, 255, 0.05);
            --text: #f1f2f6; --shadow: 10px 10px 30px #000000, -10px -10px 30px #1a1e24;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .blobs { position: absolute; width: 100%; height: 100%; z-index: -1; filter: blur(60px); }
        .blob { position: absolute; background: var(--accent); border-radius: 50%; opacity: 0.2; animation: move 20s infinite alternate linear; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(20%, 20%); } }

        .container { width: 95%; max-width: 480px; height: 85vh; background: var(--glass); backdrop-filter: blur(50px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: var(--shadow); }
        #sidebar { position: absolute; left: -300px; top: 0; width: 280px; height: 100%; background: var(--bg); transition: 0.4s ease; z-index: 1000; padding: 25px; box-sizing: border-box; border-right: 1px solid rgba(255,255,255,0.1); }
        #sidebar.open { left: 0; }

        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #chat-box { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-top: 50px; }
        .msg { margin-bottom: 12px; padding: 12px 16px; border-radius: 20px; background: rgba(255, 255, 255, 0.1); width: fit-content; max-width: 85%; word-wrap: break-word; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .msg b { display: block; font-size: 0.6rem; color: var(--accent); margin-bottom: 3px; }
        .admin-tag { color: #ff4757 !important; font-weight: 900; }
        
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; color: var(--text); outline: none; margin-bottom: 10px; }
        button { padding: 12px; border-radius: 15px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 700; }

        .top-icons { position: absolute; top: 15px; width: 100%; padding: 0 25px; display: flex; justify-content: space-between; z-index: 10; font-size: 1.2rem; box-sizing: border-box; }
        .panic-btn { position: absolute; bottom: 15px; left: 15px; opacity: 0.1; cursor: pointer; z-index: 50; }
        .msg-tools { position: absolute; top: 5px; right: 10px; display: none; gap: 5px; }
        .is-admin .msg:hover .msg-tools { display: flex; }
        .tool-icon { color: #ff4757; font-size: 0.9rem; font-weight: bold; }
        .announcement { width: 95% !important; background: rgba(255, 71, 87, 0.1) !important; border: 1px solid #ff4757 !important; text-align: center; margin: 15px auto !important; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<div class="blobs"><div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div></div>

<div class="container">
    <div id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3>Nexus Config</h3>
            <span style="cursor:pointer" onclick="toggleSidebar()">✕</span>
        </div>
        <p style="font-size:0.7rem; opacity:0.5;">HUE</p>
        <input type="range" min="0" max="360" value="252" style="width:100%" oninput="updateHue(this.value)">
        <p style="font-size:0.7rem; opacity:0.5; margin-top:15px;">OPERATIVES</p>
        <div id="member-list"></div>
    </div>

    <div class="top-icons">
        <div style="cursor:pointer" onclick="toggleSidebar()">☰</div>
        <div style="cursor:pointer" onclick="toggleTheme()">🌓</div>
    </div>

    <div class="panic-btn" onclick="location.href='https://google.com'">🚨</div>

    <div id="pw-screen" class="screen active" style="justify-content:center;">
        <h2 style="text-align:center; font-weight:200;">SECURE LOGIN</h2>
        <input type="password" id="pw-input" placeholder="Encryption Key">
        <input type="password" id="admin-input" placeholder="Admin Code (Optional)">
        <button onclick="checkPw()">VERIFY</button>
    </div>

    <div id="user-screen" class="screen" style="justify-content:center;">
        <h2 style="text-align:center; font-weight:200;">IDENTITY</h2>
        <input type="text" id="username-input" placeholder="Codename">
        <button onclick="startChat()">LINK</button>
    </div>

    <div id="chat-screen" class="screen">
        <div id="chat-box"></div>
        <div style="display:flex; flex-direction:column; gap:8px; margin-top:10px; border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
            <div style="display:flex; gap:8px;">
                <input type="text" id="msg-input" placeholder="Signal..." style="flex-grow:1; margin-bottom:0">
                <button onclick="sendText()" style="padding:10px 20px;">➤</button>
            </div>
            <div class="is-admin" id="admin-controls-ui" style="display:none;">
                <button onclick="sendAnnouncement()" style="background:#ff4757; width:100%; font-size:0.7rem;">⚠️ BOLD ANNOUNCEMENT</button>
            </div>
        </div>
    </div>
</div>

<script>
    const ABLY_KEY = 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA';

    // Verification Hashes (SHA-256)
    const LOGIN_HASH = "b7a875fc1d4d682442436f5492d50e8d3509b552737a6b9961f52b6507011d87";  
    const ADMIN_HASH = "d68e54701269925f385150853f090d8a593301a547701e85871804f58f4a1804"; 

    let username = "", ably, channel, secretKey = "", isAdmin = false;
    let mutedUsers = new Set();

    function updateHue(v) { document.documentElement.style.setProperty('--accent', `hsl(${v}, 70%, 60%)`); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function checkPw() {
        const pInput = document.getElementById('pw-input').value.trim().toLowerCase();
        const aInput = document.getElementById('admin-input').value.trim();

        // Convert hashed input to string for reliable comparison
        const hashedP = CryptoJS.SHA256(pInput).toString();
        const hashedA = CryptoJS.SHA256(aInput).toString();

        if (hashedP === LOGIN_HASH) {
            secretKey = pInput; 
            if (hashedA === ADMIN_HASH) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('admin-controls-ui').style.display = 'block';
            }
            showScreen('user-screen');
        } else {
            alert("Invalid Encryption Key.");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function startChat() {
        username = document.getElementById('username-input').value.trim();
        if(!username || ABLY_KEY.includes('YOUR')) return;
        showScreen('chat-screen');
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: username });
        channel = ably.channels.get('secure-nexus');

        channel.subscribe('msg', (m) => {
            if (mutedUsers.has(m.clientId)) return;
            addBubble(m.clientId, m.data.text, m.id, m.data.isAdmin, m.data.isAnnounce);
        });

        channel.subscribe('cmd', (m) => {
            if(m.data.t === 'del') { const el = document.getElementById(m.data.id); if(el) el.remove(); }
            if(m.data.t === 'mute') mutedUsers.add(m.data.target);
        });

        channel.presence.enter();
        channel.presence.subscribe(() => updateMembers());
    }

    function updateMembers() {
        channel.presence.get((err, members) => {
            document.getElementById('member-list').innerHTML = members.map(m => `
                <div style="font-size:0.8rem; margin-bottom:5px;">● ${m.clientId} ${mutedUsers.has(m.clientId) ? '(MUTED)' : ''}</div>
            `).join('');
        });
    }

    function addBubble(id, enc, mid, senderIsAdmin, isAnnounce) {
        const box = document.getElementById('chat-box');
        let dec; 
        try { 
            const bytes = CryptoJS.AES.decrypt(enc, secretKey);
            dec = bytes.toString(CryptoJS.enc.Utf8);
        } catch(e) { dec = "[ENCRYPTED]"; }

        const div = document.createElement('div');
        div.className = 'msg' + (isAnnounce ? ' announcement' : '');
        div.id = mid;
        if(id === username && !isAnnounce) div.style.cssText = 'margin-left:auto; background:var(--accent); color:white;';
        
        div.onclick = (e) => { 
            if(e.target.classList.contains('tool-icon')) return; 
            const span = div.querySelector('.msg-c'); 
            span.innerText = span.innerText === enc ? (dec || "[FAILED]") : enc; 
        };

        div.innerHTML = `
            <div class="msg-tools">
                <span class="tool-icon" onclick="adminMute('${id}')">🚫</span>
                <span class="tool-icon" onclick="adminDel('${mid}')">×</span>
            </div>
            <b>${senderIsAdmin ? '<span class="admin-tag">[Admin]</span> ' : ''}${id === username ? 'You' : id}</b>
            <span class="msg-c">${enc}</span>
        `;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    function sendText() {
        const i = document.getElementById('msg-input'); if(!i.value) return;
        const enc = CryptoJS.AES.encrypt(i.value, secretKey).toString();
        channel.publish('msg', { text: enc, isAdmin: isAdmin, isAnnounce: false });
        i.value = "";
    }

    function sendAnnouncement() {
        const i = document.getElementById('msg-input'); if(!i.value || !isAdmin) return;
        const enc = CryptoJS.AES.encrypt(i.value, secretKey).toString();
        channel.publish('msg', { text: enc, isAdmin: true, isAnnounce: true });
        i.value = "";
    }

    function adminDel(id) { if(isAdmin) channel.publish('cmd', { t: 'del', id: id }); }
    function adminMute(target) { if(isAdmin) { channel.publish('cmd', { t: 'mute', target: target }); alert(target + " muted."); } }

    document.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && document.getElementById('chat-screen').classList.contains('active')) sendText();
    });
</script>
</body>
</html>
