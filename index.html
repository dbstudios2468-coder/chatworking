<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus v34.4 | Deployment Build</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;700;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --accent-strong: rgba(0, 242, 255, 0.7);
            --glass-op: 0.15;
            --glass-blur: 50px;
            --glass-sat: 400%;
            --border-light: rgba(255, 255, 255, 0.4);
            --border-dark: rgba(255, 255, 255, 0.05);
            --bg-color: #030508;
            --text-color: #ffffff;
            --font-main: 'Outfit', sans-serif;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.2);
            --tx: 0px; --ty: 0px;
        }

        [data-theme="light"] {
            --bg-color: #e2e8f0; --text-color: #0f172a; 
            --glass-op: 0.6; --border-light: rgba(255, 255, 255, 0.9); --border-dark: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); scrollbar-width: none; }
        ::-webkit-scrollbar { display: none; }
        ::selection { background: var(--accent); color: #000; }

        body { background: var(--bg-color); color: var(--text-color); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; transition: 0.5s; }

        #bg-canvas { position: fixed; inset: -10%; z-index: -3; background: radial-gradient(circle at 50% 50%, #111, var(--bg-color)); background-size: cover; background-position: center; filter: blur(var(--glass-blur)) brightness(0.6); transform: translate(calc(var(--tx) * -0.4), calc(var(--ty) * -0.4)); transition: transform 0.2s linear; }
        .ambient-mesh { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 20% 80%, var(--accent-glow), transparent 60%), radial-gradient(circle at 80% 20%, var(--accent-glow), transparent 60%); mix-blend-mode: screen; pointer-events: none; animation: ambientPulse 8s infinite alternate ease-in-out; }
        @keyframes ambientPulse { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0.8; transform: scale(1.05); } }

        .nexus-grid { display: grid; gap: 30px; width: 95vw; height: 88dvh; max-width: 1700px; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
        .mode-computer { grid-template-columns: 320px 1fr 320px; }
        .mode-mobile { width: 400px; grid-template-columns: 1fr; }
        .mode-mobile .side-pill { display: none; }
        
        .mode-watch { width: 380px; height: 380px; border-radius: 50% !important; margin: auto; grid-template-columns: 1fr; overflow: hidden; border: 12px solid var(--border-light); box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .mode-watch .side-pill { display: none; }
        .mode-watch .pill-header { padding-top: 45px; justify-content: center; }
        .mode-watch .input-dock { padding-bottom: 45px; }

        .hyper-pill { 
            background: linear-gradient(145deg, rgba(255,255,255,var(--glass-op)), rgba(255,255,255,calc(var(--glass-op)/4))); 
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat)); 
            border-radius: 50px; border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); border-left: 1.5px solid var(--border-light);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 3px 3px 20px rgba(255,255,255,0.3); display: flex; flex-direction: column; overflow: hidden; position: relative;
            animation: slideUp 0.8s var(--spring) forwards;
        }
        @keyframes slideUp { 0% { transform: translateY(50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

        .pill-header { padding: 25px 30px; font-weight: 900; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-dark); }
        
        #sketch-wrap { flex: 1; margin: 20px; border-radius: 30px; background: rgba(0,0,0,0.2); overflow: hidden; }
        canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        .btn-liquid { margin: 0 20px 20px; padding: 18px; border-radius: 30px; background: var(--accent); color: #000; border: none; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; }

        #view { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .dm-header { background: var(--accent); color: #000; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; display: none; }

        .bubble-wrap { display: flex; flex-direction: column; max-width: 80%; animation: bubbleIn 0.5s var(--spring); }
        .bubble-wrap.me { align-self: flex-end; align-items: flex-end; }
        .bubble-wrap.them { align-self: flex-start; align-items: flex-start; }
        @keyframes bubbleIn { 0% { transform: scale(0.8) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .bubble-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.75rem; font-weight: 700; }
        .meta-pfp { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
        .msg-time { font-size: 0.65rem; opacity: 0.5; margin-left: 5px; }

        .bubble { padding: 16px 24px; border-radius: 30px; font-size: 1.05rem; word-wrap: break-word; overflow-wrap: break-word; position: relative; }
        .bubble-wrap.me .bubble { background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #000; border-bottom-right-radius: 8px; box-shadow: 0 10px 20px var(--accent-glow); }
        .bubble-wrap.them .bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--border-dark); border-top: 1px solid var(--border-light); border-bottom-left-radius: 8px; }
        
        .bubble img { max-width: 100%; border-radius: 15px; margin-top: 10px; }
        .del-btn { position: absolute; top: -8px; right: -8px; background: #FF3B30; color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; opacity: 0; transition: 0.3s; border: 2px solid var(--bg-color); }
        .bubble-wrap:hover .del-btn { opacity: 1; }

        .announcement { align-self: center; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); color: #000; font-weight: 900; text-transform: uppercase; text-align: center; padding: 25px; border-radius: 40px; border: 2px solid white; width: 90%; margin: 20px 0; box-shadow: 0 0 50px var(--accent-glow); }

        .input-dock { padding: 20px 30px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border-dark); display: flex; gap: 15px; }
        .input-pill { flex: 1; display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); border-radius: 100px; padding: 5px 5px 5px 25px; }
        .input-pill input { flex: 1; background: transparent; border: none; color: var(--text-color); font-size: 1.05rem; outline: none; }
        
        .action-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-color); opacity: 0.6; }
        .send-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--accent); color: #000; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }

        .user-node { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-radius: 25px; background: rgba(255,255,255,0.03); margin-bottom: 10px; cursor: pointer; transition: 0.3s; position: relative; font-weight: 700; }
        .user-node:hover { background: rgba(255,255,255,0.08); transform: translateX(8px); }
        .status-orb { width: 10px; height: 10px; border-radius: 50%; background: #2ed573; }
        .dm-alert { position: absolute; right: 20px; width: 12px; height: 12px; background: #FF3B30; border-radius: 50%; animation: ping 1.5s infinite; display: none; }
        @keyframes ping { 0% { box-shadow: 0 0 0 0 rgba(255,59,48,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,59,48,0); } 100% { box-shadow: 0 0 0 0 rgba(255,59,48,0); } }

        .cc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(30px); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .cc-panel { background: rgba(30,30,30,0.9); border: 1px solid var(--border-light); border-radius: 50px; width: 90%; max-width: 600px; padding: 40px; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(255,255,255,0.1); backdrop-filter: blur(40px); padding: 10px 20px; border-radius: 100px; transition: 0.6s var(--spring); z-index: 9000; }
        .dock.hidden { transform: translate(-50%, 150%); }
        .dock-btn { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-color); cursor: pointer; transition: 0.3s; }
        .dock-btn.active { background: var(--accent); color: #000; }

        #gate { position: fixed; inset: 0; background: var(--bg-color); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(50px); border: 1px solid var(--border-dark); border-top: 1.5px solid var(--border-light); border-radius: 60px; padding: 60px 50px; width: 450px; text-align: center; }
        .gate-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border-dark); color: white; padding: 20px; border-radius: 30px; margin-bottom: 25px; font-size: 1.1rem; text-align: center; outline: none; }
    </style>
</head>
<body onmousemove="handleParallax(event)">
    <div id="bg-canvas"></div>
    <div class="ambient-mesh"></div>

    <div id="gate">
        <div class="gate-card" id="gate-card">
            <i class="fas fa-fingerprint" style="font-size: 3.5rem; color: var(--accent); margin-bottom: 20px;"></i>
            <h1 style="font-weight: 900; font-size: 3rem; color: white;">NEXUS</h1>
            <p style="opacity: 0.6; font-size: 0.85rem; margin-bottom: 30px; letter-spacing: 2px;">V34.4 ORBITAL DEPLOY</p>
            
            <div id="step-login">
                <input type="email" id="email-in" class="gate-input" placeholder="firstname.surname@ballardschool.co.uk">
                <button class="btn-liquid" style="width: 100%; margin: 0;" onclick="processEmail()">AUTHENTICATE</button>
            </div>

            <div id="step-enter" style="display: none;">
                <h3 id="welcome-msg" style="margin-bottom: 25px; color: var(--accent);"></h3>
                <button class="btn-liquid" style="width: 100%; margin: 0;" onclick="requestAndEnter()">ENTER CHAT</button>
            </div>
        </div>
    </div>

    <div class="nexus-grid mode-computer" id="ui">
        <aside class="hyper-pill side-pill">
            <div class="pill-header"><span>Sketch Lab</span><i class="fas fa-eraser" onclick="ctx.clearRect(0,0,canvas.width,canvas.height)"></i></div>
            <div id="sketch-wrap"><canvas id="canvas"></canvas></div>
            <button class="btn-liquid" onclick="broadcastSketch()">TRANSMIT</button>
        </aside>

        <main class="hyper-pill">
            <div class="pill-header"><span id="chat-title" style="color: var(--accent);">Global Flow</span><div class="dm-header" id="dm-back" onclick="closeDM()">BACK</div></div>
            <div id="view"></div>
            <div id="typing-indicator"></div>
            <div class="input-dock">
                <div class="input-pill">
                    <input type="text" id="msg-input" placeholder="Ripple your thoughts..." onkeypress="if(event.key==='Enter') push()" oninput="sendTyping()">
                    <div class="action-icon" id="announce-btn" onclick="sendAnnounce()"><i class="fas fa-bullhorn"></i></div>
                    <button class="send-btn" onclick="push()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </main>

        <aside class="hyper-pill side-pill">
            <div style="padding:40px 20px; text-align:center;">
                <img id="local-pfp" class="main-pfp" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ffffff' opacity='0.1'/></svg>">
                <h2 id="user-display"></h2>
            </div>
            <div class="presence-list" id="online-list"></div>
        </aside>
    </div>

    <div class="dock" id="dock">
        <div class="dock-btn active" onclick="setMode('computer', this)"><i class="fas fa-desktop"></i></div>
        <div class="dock-btn" onclick="setMode('mobile', this)"><i class="fas fa-mobile-alt"></i></div>
        <div class="dock-btn" onclick="setMode('watch', this)"><i class="fas fa-dot-circle"></i></div>
        <div class="dock-btn" onclick="document.getElementById('bg-up').click()"><i class="fas fa-image"></i></div>
        <div class="dock-btn" onclick="toggleCC()"><i class="fas fa-sliders-h"></i></div>
        <div class="dock-btn" onclick="toggleStealth()"><i class="fas fa-eye-slash"></i></div>
        <div class="dock-btn" onclick="window.location.href='https://google.com'" style="color:#ff3b30"><i class="fas fa-bolt"></i></div>
    </div>
    <div class="stealth-pull" id="dock-reveal" onclick="toggleStealth()"></div>

    <div class="cc-overlay" id="cc" onclick="if(event.target === this) toggleCC()">
        <div class="cc-panel">
            <h2 style="margin-bottom: 20px; color: white;">Architecture</h2>
            <button class="btn-liquid" style="width:100%; margin:0 0 20px 0;" onclick="document.getElementById('pfp-up').click()">UPDATE PHOTO</button>
            <input type="file" id="pfp-up" hidden onchange="handlePfp(this)">
            <label style="opacity:0.6; font-size:0.8rem;">THEME COLOR</label>
            <div style="display:flex; gap:10px; margin:10px 0 20px 0;">
                <div style="width:30px; height:30px; border-radius:50%; background:#00f2ff; cursor:pointer;" onclick="setCol('#00f2ff')"></div>
                <div style="width:30px; height:30px; border-radius:50%; background:#ff2d55; cursor:pointer;" onclick="setCol('#ff2d55')"></div>
                <div style="width:30px; height:30px; border-radius:50%; background:#30d158; cursor:pointer;" onclick="setCol('#30d158')"></div>
                <div style="width:30px; height:30px; border-radius:50%; background:#ffffff; cursor:pointer;" onclick="setCol('#ffffff')"></div>
            </div>
            <button class="btn-liquid" style="width: 100%; margin: 0;" onclick="toggleCC()">CLOSE</button>
        </div>
    </div>

    <input type="file" id="bg-up" hidden onchange="handleBg(this)">

    <script>
        let client, chanMain, chanDM, user, receivedIds = new Set();
        let activeDM = null, unreadDMs = new Set();
        const secret = "v34.4_quantum";
        let typingTimeout;

        const sndOut = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');
        const sndIn = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

        window.onload = () => { 
            let s = localStorage.getItem('nx_user'); 
            if(s) { user = s; document.getElementById('step-login').style.display = 'none'; document.getElementById('welcome-msg').innerText = `Welcome back, ${user}.`; document.getElementById('step-enter').style.display = 'block'; } 
            loadSettings(); 
        };

        function processEmail() {
            let email = document.getElementById('email-in').value.trim().toLowerCase();
            if(!email.endsWith('@ballardschool.co.uk')) return alert("Use school email.");
            user = email.split('@')[0].split('.')[0]; user = user.charAt(0).toUpperCase() + user.slice(1);
            localStorage.setItem('nx_user', user);
            document.getElementById('step-login').style.display = 'none';
            document.getElementById('welcome-msg').innerText = `Confirmed, ${user}.`;
            document.getElementById('step-enter').style.display = 'block';
        }

        function requestAndEnter() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission().then(perm => {
                    if(perm === "granted") new Notification("Nexus Active", { body: "Orbital Pings enabled." });
                    ignite();
                });
            } else { ignite(); }
        }

        function ignite() {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('ui').style.opacity = '1';
            document.getElementById('ui').style.pointerEvents = 'all';
            initNetwork();
        }

        function initNetwork() {
            document.getElementById('user-display').innerText = user;
            const pfp = localStorage.getItem('nx_pfp'); if(pfp) document.getElementById('local-pfp').src = pfp;

            client = new Ably.Realtime({ key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA', clientId: user });
            chanMain = client.channels.get('v34-flow');
            chanMain.subscribe('msg', p => ingest(p.data, false));
            chanMain.subscribe('announce', p => { if(!activeDM && p.data.u !== user && !receivedIds.has(p.data.id)) { receivedIds.add(p.data.id); renderAnnounce(dec(p.data.c), p.data.u, p.data.t); sndIn.play(); sendNotif(`Broadcast: ${p.data.u}`, dec(p.data.c)); } });
            chanMain.subscribe('del', p => document.getElementById(p.data.id)?.remove());
            chanMain.presence.subscribe(() => syncPres());
            chanMain.presence.enter({ pfp: pfp });
            client.channels.get('v34-dm-'+user).subscribe('msg', p => ingest(p.data, true));
            initCanvas(); loadHistory();
        }

        function syncPres() {
            chanMain.presence.get((err, m) => {
                const l = document.getElementById('online-list'); l.innerHTML = '';
                let uMap = new Map(); m.forEach(x => uMap.set(x.clientId, x.data));
                uMap.forEach((d, id) => {
                    let img = d?.pfp ? `<img src="${d.pfp}" class="meta-pfp" style="width:30px; height:30px;">` : `<div class="status-orb"></div>`;
                    let al = unreadDMs.has(id) ? 'display:block' : '';
                    l.innerHTML += `<div class="user-node ${id===user?'me':''}" onclick="${id!==user?`openDM('${id}')`:''}">
                        ${img} ${id} <div class="dm-alert" style="${al}"></div>
                    </div>`;
                });
            });
        }

        function openDM(t) { activeDM = t; unreadDMs.delete(t); syncPres(); document.getElementById('chat-title').innerText = "DM: "+t; document.getElementById('dm-back').style.display='block'; document.getElementById('view').innerHTML=''; loadHistory(); }
        function closeDM() { activeDM = null; document.getElementById('chat-title').innerText = "Global Flow"; document.getElementById('dm-back').style.display='none'; document.getElementById('view').innerHTML=''; loadHistory(); }

        function ingest(d, dm) {
            if(receivedIds.has(d.id)) return; receivedIds.add(d.id);
            if(dm) { if(activeDM===d.u){ renBub(d); saveL('dm_'+d.u, d); } else { unreadDMs.add(d.u); syncPres(); saveL('dm_'+d.u, d); sendNotif(`DM: ${d.u}`, dec(d.c), d.pfp); } }
            else { if(!activeDM && d.u!==user) renBub(d); if(!dm) saveL('global', d); if(d.u!==user) sendNotif(d.u, dec(d.c), d.pfp); }
            if(d.u!==user) sndIn.play().catch(()=>{});
        }

        function push() {
            const i = document.getElementById('msg-input'); if(!i.value) return;
            const id = 'm_'+Date.now(), t = Date.now(), pfp = localStorage.getItem('nx_pfp');
            const pld = { id, u: user, c: enc(i.value), pfp, t };
            receivedIds.add(id);
            if(activeDM){ client.channels.get('v34-dm-'+activeDM).publish('msg', pld); saveL('dm_'+activeDM, pld); }
            else { chanMain.publish('msg', pld); saveL('global', pld); }
            renBub(pld); i.value = ''; sndOut.play().catch(()=>{});
        }

        function renBub(d) {
            if(document.getElementById(d.id)) return;
            const me = d.u === user, time = new Date(d.t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
            const v = document.getElementById('view'), div = document.createElement('div');
            div.className = `bubble-wrap ${me?'me':'them'}`; div.id = d.id;
            div.innerHTML = `<div class="bubble-meta">${!me&&d.pfp?`<img src="${d.pfp}" class="meta-pfp">`:''}<span>${me?'You':d.u}</span><span class="msg-time">${time}</span></div><div class="bubble">${dec(d.c)}${d.img?`<img src="${d.img}">`:''}${me?`<div class="del-btn" onclick="nuke('${d.id}')">X</div>`:''}</div>`;
            v.appendChild(div); v.scrollTop = v.scrollHeight;
        }

        function renderAnnounce(txt, s, t) {
            const v = document.getElementById('view'), div = document.createElement('div');
            div.className = 'announcement'; div.innerHTML = `<div style="font-size:0.7rem; opacity:0.7; margin-bottom:5px;">BROADCAST: ${s}</div>${txt}`;
            v.appendChild(div); v.scrollTop = v.scrollHeight;
        }

        function nuke(id) { document.getElementById(id)?.remove(); if(!activeDM) chanMain.publish('del',{id}); }
        function sendNotif(t, b, i) { if(document.hidden && Notification.permission==="granted") new Notification(t, {body:b, icon:i}); }
        function handleParallax(e) { document.documentElement.style.setProperty('--tx', (window.innerWidth/2 - e.clientX)/60+'px'); document.documentElement.style.setProperty('--ty', (window.innerHeight/2 - e.clientY)/60+'px'); }
        function toggleStealth() { document.getElementById('dock').classList.toggle('hidden'); document.getElementById('dock-reveal').classList.toggle('visible'); }
        function toggleCC() { const c = document.getElementById('cc'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function setMode(m, b) { document.getElementById('ui').className = 'nexus-grid mode-'+m; document.querySelectorAll('.dock-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); }
        function setCol(h) { document.documentElement.style.setProperty('--accent', h); localStorage.setItem('nx_color', h); }
        function handleBg(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('bg-canvas').style.backgroundImage = `url(${e.target.result})`; localStorage.setItem('nx_bg', e.target.result); }; r.readAsDataURL(i.files[0]); } }
        function handlePfp(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { const img = new Image(); img.onload = () => { const c = document.createElement('canvas'), ctx = c.getContext('2d'); c.width=100; c.height=100; ctx.drawImage(img,0,0,100,100); const b64 = c.toDataURL('image/jpeg', 0.5); localStorage.setItem('nx_pfp', b64); document.getElementById('local-pfp').src=b64; if(chanMain) chanMain.presence.update({pfp: b64}); }; img.src=e.target.result; }; r.readAsDataURL(i.files[0]); } }
        function loadSettings() { const bg = localStorage.getItem('nx_bg'); if(bg) document.getElementById('bg-canvas').style.backgroundImage = `url(${bg})`; const col = localStorage.getItem('nx_color'); if(col) setCol(col); }
        function saveL(k, p) { let h = JSON.parse(localStorage.getItem('nx34_'+k)) || []; h.push(p); localStorage.setItem('nx34_'+k, JSON.stringify(h.slice(-50))); }
        function loadHistory() { let k = activeDM ? 'dm_'+activeDM : 'global'; let h = JSON.parse(localStorage.getItem('nx34_'+k)) || []; h.forEach(d => { receivedIds.add(d.id); if(d.type==='ann') renderAnnounce(dec(d.c), d.u, d.t); else renBub(d); }); }
        function enc(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function dec(c) { try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } catch { return "[Encrypted]"; } }
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d'); let drawing = false;
        function initCanvas() { const w = document.getElementById('sketch-wrap'); canvas.width = w.clientWidth; canvas.height = w.clientHeight; ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round'; canvas.onmousedown = () => { drawing=true; ctx.beginPath(); }; canvas.onmousemove = e => { if(drawing) ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); }; window.onmouseup = () => drawing = false; }
        function broadcastSketch() { const id = 's_'+Date.now(), pfp = localStorage.getItem('nx_pfp'); const pld = { id, u: user, c: enc("[Sketch]"), img: canvas.toDataURL(), pfp, t: Date.now() }; receivedIds.add(id); if(activeDM){ client.channels.get('v34-dm-'+activeDM).publish('msg', pld); saveL('dm_'+activeDM, pld); } else { chanMain.publish('msg', pld); saveL('global', pld); } renBub(pld); ctx.clearRect(0,0,canvas.width,canvas.height); }
    </script>
</body>
