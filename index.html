<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus v25 | Synthesis</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.15);
            --accent-glow-strong: rgba(0, 242, 255, 0.4);
            --glass: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            --border: rgba(255, 255, 255, 0.25);
            --bg: #010204;
            --text: #ffffff;
            --blur: 80px;
            --tx: 0px; --ty: 0px;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.3);
        }

        [data-brightness="light"] {
            --bg: #f4f7f9; --text: #1a1c20; 
            --glass: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.4)); 
            --border: rgba(255, 255, 255, 0.6); 
            --accent-glow-strong: rgba(0, 122, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        body { background: var(--bg); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text); transition: background 0.8s ease; }

        #bg-layer { position: fixed; inset: -10%; z-index: -2; background-size: cover; background-position: center; filter: blur(var(--blur)) brightness(0.7); transition: transform 1s var(--spring); transform: translate(calc(var(--tx) * -0.2), calc(var(--ty) * -0.2)); }
        .caustics { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, var(--accent-glow-strong), transparent); opacity: 0.5; pointer-events: none; }
        
        .nexus-wrapper { display: grid; gap: 20px; width: 96vw; height: 84dvh; max-width: 1800px; opacity: 0; pointer-events: none; transition: transform 0.5s var(--spring); }
        .mode-computer { grid-template-columns: 320px 1fr 240px; }
        .mode-mobile { width: 420px; grid-template-columns: 1fr; }
        .mode-watch { width: 380px; height: 380px; aspect-ratio: 1/1; border-radius: 50% !important; border: 12px solid var(--border); grid-template-columns: 1fr; overflow: hidden; margin: auto; }
        
        aside { display: flex; flex-direction: column; }
        .mode-mobile aside, .mode-watch aside { display: none; }

        .glass-panel { background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(250%); border: 1.5px solid var(--border); border-radius: 60px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5), inset 0 2px 20px rgba(255,255,255,0.15); transition: border-color 0.5s ease; }

        #sketch-wrap { flex: 1; margin: 20px; background: rgba(0,0,0,0.2); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; touch-action: none; }

        /* BUBBLES & WORD WRAPPING */
        .bubble { padding: 18px 28px; border-radius: 40px; font-size: 1rem; animation: liquid-bloom 0.6s var(--spring); position: relative; max-width: 85%; line-height: 1.5; margin-bottom: 12px; word-wrap: break-word; overflow-wrap: break-word; }
        @keyframes liquid-bloom { 0% { transform: scale(0.5) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        
        .bubble.me { align-self: flex-end; background: linear-gradient(135deg, var(--accent), rgba(255,255,255,0.8)); color: #000; font-weight: 800; border-bottom-right-radius: 8px; }
        .bubble.them { align-self: flex-start; background: rgba(255,255,255,0.15); color: var(--text); border: 1.5px solid var(--border); border-bottom-left-radius: 8px; }
        
        /* REACTIONS SYSTEM */
        .react-bar { position: absolute; bottom: -12px; left: 20px; display: flex; gap: 4px; z-index: 5; }
        .react-tag { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; font-size: 0.75rem; display: flex; align-items: center; gap: 4px; animation: pop 0.3s var(--spring); color: var(--text); }
        .react-palette { position: absolute; top: -45px; left: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 30px; padding: 5px 15px; display: none; gap: 10px; border: 1.5px solid var(--accent); z-index: 100; animation: drop-in 0.3s var(--spring); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* ACTION BUTTONS */
        .action-btn { position: absolute; top: -8px; width: 28px; height: 28px; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; opacity: 0; transform: scale(0.5); transition: 0.3s var(--spring); border: 2px solid var(--bg); z-index: 10; }
        .bubble:hover .action-btn { opacity: 1; transform: scale(1); }
        .del-btn { right: -8px; background: #ff4757; }
        .reply-btn { right: 25px; background: var(--accent); color: #000; }
        .react-trigger { left: -8px; background: #ffa502; color: #000; }

        /* DOCK */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.15); backdrop-filter: blur(40px); padding: 12px 30px; border-radius: 100px; display: flex; gap: 15px; z-index: 9999; border: 2px solid rgba(255,255,255,0.3); transition: 0.6s var(--spring); }
        .dock.hidden { transform: translate(-50%, 150%); opacity: 0; }
        .dock-tool { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); background: rgba(255,255,255,0.08); transition: 0.3s; }
        .dock-tool:hover, .dock-tool.active { transform: scale(1.2); background: var(--accent); color: #000; }

        #dock-reveal { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 5px 30px; border-radius: 20px 20px 0 0; cursor: pointer; transition: 0.4s; z-index: 9998; }
        #dock-reveal.visible { bottom: 0; }

        /* LOGIN GATE */
        #gate { position: fixed; inset: 0; z-index: 10000; background: #000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--glass); padding: 60px; border-radius: 80px; border: 2px solid var(--accent); text-align: center; width: 450px; backdrop-filter: blur(50px); }
        .input-liquid { width: 100%; padding: 20px; border-radius: 50px; border: 1.5px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 20px; text-align: center; outline: none; font-size: 1.1rem; }
    </style>
</head>
<body onmousemove="handleMove(event)">
    <div id="bg-layer"></div>
    <div class="caustics"></div>

    <div id="gate">
        <div class="login-card">
            <h1 style="margin-bottom: 10px; letter-spacing: -5px; font-size: 4rem; font-weight: 900; color:white;">NEXUS</h1>
            <p style="opacity:0.6; font-size: 0.8rem; margin-bottom:30px; letter-spacing: 2px; font-weight:800; color:var(--accent);">V25 SYNTHESIS</p>
            <input type="email" id="email-in" placeholder="firstname.surname@ballardschool.co.uk" class="input-liquid">
            <button onclick="boot()" class="input-liquid" style="background:white; color:black; font-weight:900; border:none; cursor:pointer;">ENGAGE</button>
        </div>
    </div>

    <div class="nexus-wrapper mode-computer" id="ui">
        <aside class="glass-panel">
            <div style="padding:30px; font-weight:900; border-bottom:1.5px solid var(--border);">LAB</div>
            <div id="sketch-wrap"><canvas id="canvas"></canvas></div>
            <button onclick="broadcastSketch()" style="margin: 0 30px 30px; padding:20px; border-radius:50px; border:none; background:var(--accent); color:black; font-weight:900; cursor:pointer;">BROADCAST</button>
        </aside>

        <main class="glass-panel">
            <div id="view" style="flex:1; overflow-y:auto; padding:40px; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="padding: 25px 30px; background: rgba(0,0,0,0.15);">
                <div style="background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 100px; padding: 10px; display: flex; gap: 15px;">
                    <input type="text" id="msg-input" placeholder="Ripple a thought..." style="flex:1; background:transparent; border:none; padding:10px 20px; color:var(--text); outline:none; font-size:1rem;" onkeypress="if(event.key==='Enter') push()">
                    <button onclick="push()" style="background:var(--text); color:var(--bg); border:none; padding:0 40px; border-radius:100px; font-weight:900; cursor:pointer;">SEND</button>
                </div>
            </div>
        </main>

        <aside class="glass-panel">
            <div style="padding:30px; font-weight:900; border-bottom:1.5px solid var(--border);">ONLINE</div>
            <div style="padding:40px; text-align:center;">
                <div style="width:24px; height:24px; border-radius:50%; background:var(--accent); box-shadow: 0 0 30px var(--accent-glow-strong); margin: 0 auto 20px;"></div>
                <div id="user-display" style="font-weight:700; text-transform:uppercase; font-size:1.2rem;"></div>
            </div>
        </aside>
    </div>

    <div class="dock" id="dock">
        <div class="dock-tool active" onclick="setMode('computer', this)"><i class="fas fa-desktop"></i></div>
        <div class="dock-tool" onclick="setMode('mobile', this)"><i class="fas fa-mobile-alt"></i></div>
        <div class="dock-tool" onclick="setMode('watch', this)"><i class="fas fa-clock"></i></div>
        <div style="width:2px; background:rgba(255,255,255,0.2); margin:5px 0;"></div>
        <div class="dock-tool" onclick="document.getElementById('bg-up').click()"><i class="fas fa-image"></i></div>
        <div class="dock-tool" onclick="toggleTheme()"><i class="fas fa-sun"></i></div>
        <div class="dock-tool" onclick="toggleDock()"><i class="fas fa-eye-slash"></i></div>
        <div class="dock-tool" onclick="toggleFS()"><i class="fas fa-expand-alt"></i></div>
    </div>
    <div id="dock-reveal" onclick="toggleDock()"><i class="fas fa-chevron-up"></i></div>

    <input type="file" id="bg-up" hidden accept="image/*" onchange="handleBg(this)">

    <script>
        let client, chan, user, receivedIds = new Set();
        const secret = "v25_ballard";
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        let drawing = false;

        function handleMove(e) {
            const x = (window.innerWidth / 2 - e.clientX) / 25, y = (window.innerHeight / 2 - e.clientY) / 25;
            document.documentElement.style.setProperty('--tx', x + 'px');
            document.documentElement.style.setProperty('--ty', y + 'px');
        }

        async function boot() {
            let email = document.getElementById('email-in').value.trim().toLowerCase();
            if(!email.endsWith('@ballardschool.co.uk')) return alert("Use school email.");
            
            let firstName = email.split('@')[0].split('.')[0];
            user = firstName.charAt(0).toUpperCase() + firstName.slice(1);
            localStorage.setItem('nx_user', user);
            
            initNexus();
        }

        window.onload = () => {
            let saved = localStorage.getItem('nx_user');
            if(saved) { user = saved; initNexus(); }
        }

        function initNexus() {
            document.getElementById('gate').style.display = 'none';
            const ui = document.getElementById('ui');
            ui.style.opacity = '1'; ui.style.pointerEvents = 'all';
            
            client = new Ably.Realtime({ key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA' });
            chan = client.channels.get('v25-flow');
            document.getElementById('user-display').innerText = user;

            chan.subscribe('msg', p => {
                if(receivedIds.has(p.data.id)) return;
                receivedIds.add(p.data.id);
                if(p.data.u !== user) render(dec(p.data.c), 'them', p.data.u, p.data.img, p.data.id);
            });

            chan.subscribe('react', p => { updateReactUI(p.data.id, p.data.emoji, p.data.count); });
            chan.subscribe('del', p => { document.getElementById(p.data.id)?.remove(); });

            initCanvas(); load();
        }

        function push() {
            const i = document.getElementById('msg-input'); if(!i.value) return;
            const id = 'msg_' + Date.now();
            const data = { id, u: user, c: enc(i.value) };
            receivedIds.add(id); chan.publish('msg', data);
            render(i.value, 'me', 'You', null, id);
            save(data); i.value = '';
        }

        function render(txt, type, s, img, id) {
            if(document.getElementById(id)) return;
            const v = document.getElementById('view'), b = document.createElement('div');
            b.className = `bubble ${type}`; b.id = id;
            
            b.innerHTML = `
                <small style="display:block;opacity:0.7;font-size:0.7rem;font-weight:900;">${s}</small>
                ${txt}
                ${img ? `<img src="${img}" style="width:100%; border-radius:20px; margin-top:10px;">` : ''}
                <div class="react-bar" id="bar-${id}"></div>
                <div class="action-btn react-trigger" onclick="togglePalette('${id}')"><i class="fas fa-smile"></i></div>
                <div class="react-palette" id="pal-${id}">
                    ${['❤️','👍','🔥','😂','😮','😢'].map(e => `<span onclick="sendReact('${id}','${e}')" style="cursor:pointer">${e}</span>`).join('')}
                </div>
                ${type === 'me' ? `<div class="action-btn del-btn" onclick="chan.publish('del',{id:'${id}'});document.getElementById('${id}').remove()">X</div>` : ''}
            `;
            v.appendChild(b); v.scrollTop = v.scrollHeight;
        }

        function sendReact(id, emoji) {
            chan.publish('react', { id, emoji, user });
            document.getElementById('pal-'+id).style.display = 'none';
        }

        function updateReactUI(id, emoji, count) {
            const bar = document.getElementById('bar-'+id);
            if(!bar) return;
            let existing = bar.querySelector(`[data-emoji="${emoji}"]`);
            if(existing) existing.remove();
            else bar.innerHTML += `<div class="react-tag" data-emoji="${emoji}">${emoji}</div>`;
        }

        function togglePalette(id) {
            const p = document.getElementById('pal-'+id);
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleDock() { document.getElementById('dock').classList.toggle('hidden'); document.getElementById('dock-reveal').classList.toggle('visible'); }
        function setMode(m, btn) { document.getElementById('ui').className = 'nexus-wrapper mode-'+m; document.querySelectorAll('.dock-tool').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); setTimeout(initCanvas, 500); }
        function toggleTheme() { document.body.setAttribute('data-brightness', document.body.getAttribute('data-brightness')==='light'?'dark':'light'); }
        function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function enc(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function dec(c) { try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } catch { return "[Encrypted]"; } }
        function save(d) { let h = JSON.parse(localStorage.getItem('nx_h')) || []; h.push(d); localStorage.setItem('nx_h', JSON.stringify(h.slice(-30))); }
        function load() { let h = JSON.parse(localStorage.getItem('nx_h')) || []; h.forEach(d => { receivedIds.add(d.id); render(dec(d.c), d.u === user ? 'me' : 'them', d.u === user ? 'You' : d.u, d.img, d.id); }); }
        function initCanvas() { const w = document.getElementById('sketch-wrap'); canvas.width = w.clientWidth; canvas.height = w.clientHeight; ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; canvas.onmousedown = e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); }; canvas.onmousemove = e => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } }; window.onmouseup = () => drawing = false; }
        function broadcastSketch() { const id = 'sk_'+Date.now(); const data = { id, u: user, c: enc("[Sketch]"), img: canvas.toDataURL() }; receivedIds.add(id); chan.publish('msg', data); render("[Sketch]", 'me', 'You', data.img, id); save(data); ctx.clearRect(0,0,canvas.width,canvas.height); }
        function handleBg(input) { if(input.files[0]) { const r = new FileReader(); r.onload = e => document.getElementById('bg-layer').style.backgroundImage = `url(${e.target.result})`; r.readAsDataURL(input.files[0]); } }
    </script>
</body>
</html>
