<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Nexus v11 | Specular Evolution</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.2);
            --bg: #010204;
            --text: #ffffff;
            --blur: 50px;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.4);
        }

        [data-brightness="light"] {
            --bg: #f2f5f9;
            --text: #1a1c20;
            --glass: rgba(255, 255, 255, 0.55);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.5s var(--spring); }
        body { background: var(--bg); height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text); }

        .liquid-env { position: fixed; inset: 0; z-index: -1; filter: blur(100px) contrast(1.3); }
        .orb { position: absolute; width: 65vh; height: 65vh; background: var(--accent); border-radius: 50%; opacity: 0.35; animation: drift 20s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: translate(-15%, -15%); } 100% { transform: translate(30%, 30%); } }

        /* DYNAMIC DOCK - Syncs with Theme */
        .dock {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.12); backdrop-filter: blur(25px);
            padding: 10px 20px; border-radius: 100px; display: flex; gap: 14px;
            z-index: 9999; border: 1.5px solid var(--accent); box-shadow: 0 15px 45px rgba(0,0,0,0.3), 0 0 20px var(--accent-glow);
        }
        .mode-watch ~ .dock { bottom: auto; top: 15px; transform: translateX(-50%) scale(0.75); }

        .dock-tool { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.06); font-size: 1.1rem; color: var(--text); }
        .dock-tool.active { background: var(--accent); color: white; box-shadow: 0 0 25px var(--accent-glow); }

        /* PILL LAYOUTS */
        .nexus-wrapper { display: grid; gap: 20px; position: relative; margin: auto; max-width: 100%; width: 100%; justify-content: center; }
        .mode-computer { width: 94vw; height: 78dvh; grid-template-columns: 1fr 260px; }
        .mode-mobile { width: 400px; height: 80dvh; grid-template-columns: 1fr; }
        .mode-watch { width: 380px; height: 380px; aspect-ratio: 1/1; border-radius: 50% !important; border: 10px solid var(--border); overflow: hidden; }
        .mode-watch aside { display: none; }

        /* GLASS PILLS */
        .glass-panel { background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(190%); border: 1.5px solid var(--border); overflow: hidden; display: flex; flex-direction: column; border-radius: 60px; }
        .scroll-flow { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        .scroll-flow::-webkit-scrollbar { width: 4px; }
        .scroll-flow::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .bubble { padding: 18px 26px; border-radius: 40px; font-size: 1rem; animation: liquid-pop 0.6s var(--spring); position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .bubble.me { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #fff); color: #000; font-weight: 700; border-bottom-right-radius: 10px; }
        .bubble.them { align-self: flex-start; background: rgba(255,255,255,0.12); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 10px; }

        /* LOGIN */
        #gate { position: fixed; inset: 0; z-index: 9000; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--glass); padding: 50px; border-radius: 80px; border: 2px solid var(--accent); text-align: center; max-width: 420px; width: 100%; backdrop-filter: blur(35px); box-shadow: 0 0 40px var(--accent-glow); }
        .input-pill { width: 100%; padding: 18px; border-radius: 40px; border: 1.5px solid var(--border); background: rgba(0,0,0,0.25); color: var(--text); margin-bottom: 22px; text-align: center; outline: none; font-size: 1.2rem; }
        .btn-pill { width: 100%; padding: 18px; border-radius: 40px; border: none; background: var(--text); color: var(--bg); font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* SETTINGS PILL */
        .overlay { position: absolute; inset: 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); z-index: 5000; padding: 40px; display: none; flex-direction: column; border-radius: 50px; color: white; border: 1px solid var(--accent); }
        .mode-watch .overlay { inset: 0; border-radius: 50%; padding: 70px 40px; }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin: 15px 0; }

        @keyframes liquid-pop { 0% { transform: scale(0.7) translateY(40px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    </style>
</head>
<body data-brightness="dark">
    <div class="liquid-env"><div class="orb"></div></div>

    <div id="gate">
        <div class="login-card">
            <h1 style="margin-bottom: 10px; letter-spacing: -3px; font-size: 3rem; font-weight: 800;">NEXUS</h1>
            <input type="text" id="username-in" placeholder="Username" class="input-pill" autocomplete="off">
            <button onclick="boot()" id="boot-btn" class="btn-pill">ENGAGE</button>
        </div>
    </div>

    <div class="nexus-wrapper mode-computer" id="ui">
        <main class="glass-panel" style="border-radius: inherit;">
            <div id="settings-view" class="overlay">
                <h2 style="margin-bottom: 30px;">Specular Settings</h2>
                <div style="margin-bottom:20px;">
                    <label>Glass Frost</label>
                    <input type="range" min="0" max="100" value="50" oninput="document.documentElement.style.setProperty('--blur', this.value+'px')">
                    <label>Liquid Intensity</label>
                    <input type="range" min="10" max="100" value="35" oninput="document.querySelector('.orb').style.opacity = this.value/100">
                </div>
                <button onclick="toggleOverlay('settings-view')" class="btn-pill" style="margin-top:auto;">SAVE CHANGES</button>
            </div>

            <div class="scroll-flow" id="view"></div>
            
            <div style="padding: 25px; background: rgba(0,0,0,0.15);">
                <div style="background: rgba(255,255,255,0.06); border: 1.5px solid var(--border); border-radius: 100px; padding: 8px; display: flex; gap: 10px;">
                    <input type="text" id="msg-input" placeholder="Pulse..." style="flex:1; background:transparent; border:none; padding:12px 20px; color:var(--text); outline:none;" onkeypress="if(event.key==='Enter') push()">
                    <button onclick="push()" style="background:var(--text); color:var(--bg); border:none; padding:0 30px; border-radius:100px; font-weight:800; cursor:pointer;">SEND</button>
                </div>
            </div>
        </main>

        <aside class="glass-panel" style="border-radius: inherit;">
            <div style="padding:30px; font-weight:800; border-bottom:1px solid var(--border); text-align:center;">ONLINE</div>
            <div style="padding:25px; display:flex; flex-direction:column; align-items:center;">
                <div style="width:12px; height:12px; border-radius:50%; background:var(--accent); box-shadow: 0 0 15px var(--accent);"></div>
                <div id="user-display" style="margin-top:20px; font-weight: 700; opacity: 0.7;"></div>
            </div>
        </aside>
    </div>

    <div class="dock">
        <div class="dock-tool active" onclick="setMode('computer', this)"><i class="fas fa-desktop"></i></div>
        <div class="dock-tool" onclick="setMode('mobile', this)"><i class="fas fa-mobile-alt"></i></div>
        <div class="dock-tool" onclick="setMode('watch', this)"><i class="fas fa-clock"></i></div>
        <div style="width:1px; background:var(--border); margin:5px 0;"></div>
        <div class="dock-tool" onclick="toggleTheme()"><i class="fas fa-adjust"></i></div>
        <div class="dock-tool" onclick="toggleOverlay('settings-view')"><i class="fas fa-sliders-h"></i></div>
        <div class="dock-tool" onclick="toggleFS()"><i class="fas fa-expand"></i></div>
    </div>

    <script>
        let client, chan, user, secret = "v11_pill_evolution";

        async function boot() {
            user = document.getElementById('username-in').value.trim();
            if(!user) return;
            document.getElementById('boot-btn').innerText = "Syncing...";
            client = new Ably.Realtime({ 
                key: 'fVAQIA.kFtCvw:X6QXTzbh4Tbi1HUBiOQMlReiyw0uwkbOnEibDEM_VdA',
                transports: ['xhr_streaming', 'xhr_polling', 'web_socket']
            });
            client.connection.on('connected', () => {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('user-display').innerText = user.toUpperCase();
                chan = client.channels.get('v11-flow');
                chan.subscribe('msg', p => { if(p.data.u !== user) renderMsg(dec(p.data.c), 'them', p.data.u); });
                loadHistory();
            });
        }

        function setMode(m, btn) {
            document.getElementById('ui').className = 'nexus-wrapper mode-' + m;
            document.querySelectorAll('.dock-tool').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-brightness', b.getAttribute('data-brightness') === 'light' ? 'dark' : 'light');
        }

        function toggleOverlay(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function push() {
            const i = document.getElementById('msg-input');
            if(!i.value) return;
            const data = { u: user, c: enc(i.value), t: Date.now() };
            chan.publish('msg', data);
            saveMsg(data);
            renderMsg(i.value, 'me', 'You');
            i.value = '';
        }

        function renderMsg(txt, type, s) {
            const v = document.getElementById('view');
            const b = document.createElement('div');
            b.className = `bubble ${type}`;
            b.innerHTML = `<small style="display:block;opacity:0.5;font-size:0.6rem;margin-bottom:4px;">${s}</small>${txt}`;
            v.appendChild(b);
            v.scrollTop = v.scrollHeight;
        }

        function saveMsg(data) {
            let h = JSON.parse(localStorage.getItem('nx11_hist')) || [];
            h.push(data);
            localStorage.setItem('nx11_hist', JSON.stringify(h.slice(-50)));
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('nx11_hist')) || [];
            h.forEach(d => renderMsg(dec(d.c), d.u === user ? 'me' : 'them', d.u === user ? 'You' : d.u));
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function enc(t) { return CryptoJS.AES.encrypt(t, secret).toString(); }
        function dec(c) { try { return CryptoJS.AES.decrypt(c, secret).toString(CryptoJS.enc.Utf8); } catch { return "[Encrypted]"; } }
    </script>
</body>
</html>
